<p>毎日1タップで安否確認。離れて暮らすご家族の安心をサポートするiOS/iPadOSアプリです。</p>

<h2>主な機能</h2>
<ul>
    <li>毎日の体調をタップで記録（元気・ふつう・調子悪い）</li>
    <li>一定時間タップがないと家族のLINEに自動通知</li>
    <li>SOSボタンで緊急時に家族へ通知・119番発信</li>
